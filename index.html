<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hierarchy Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Hierarchy Analyzer</h1>

    <p class="subtitle">
        Enter node relationships separated by commas
    </p>

    <textarea id="inputBox" placeholder="A->B, A->C, B->D"></textarea>

    <button id="submitBtn">
        Analyze
    </button>

    <div id="error"></div>

    <pre id="output"></pre>

</div>

<script src="script.js"></script>

</body>
</html>
